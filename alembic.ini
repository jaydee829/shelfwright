# Alembic configuration (Lift 1, ADR-048).
# sqlalchemy.url is intentionally ABSENT: alembic/env.py resolves the URL exactly
# like the app does (DATABASE_URL first, then POSTGRES_* components — db/session.py).
# Tests inject a URL programmatically via Config.set_main_option("sqlalchemy.url", ...).

[alembic]
script_location = alembic

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
