services:
  db:
    image: pgvector/pgvector:16-pg16
    container_name: agentic_librarian_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-librarian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-librarian_secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-agentic_librarian}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-librarian} -d ${POSTGRES_DB:-agentic_librarian}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: agentic_librarian_mlflow
    restart: always
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-postgresql://librarian:librarian_secret_password@db:5432/agentic_librarian}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./mlruns:/app/mlruns
    command: >
      mlflow server 
      --backend-store-uri ${MLFLOW_TRACKING_URI:-postgresql://librarian:librarian_secret_password@db:5432/agentic_librarian}
      --default-artifact-root /app/mlruns
      --host 0.0.0.0

volumes:
  pgdata:
