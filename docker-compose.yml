services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic_librarian_app
    env_file: .env
    environment:
      # Ensure the app talks to the 'db' service over the compose network,
      # regardless of what POSTGRES_HOST is set to in .env.
      POSTGRES_HOST: db
      # Log experiments to the MLflow server on the compose network
      # (no DB credentials needed on the client side).
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # Consolidate ALL `claude` CLI state (config .claude.json + OAuth credentials,
      # which otherwise split between ~/.claude.json and ~/.claude/) into the single
      # claude_auth-mounted dir below, so a one-time login persists across rebuilds.
      CLAUDE_CONFIG_DIR: /home/appuser/.claude
    volumes:
      # Bind-mount the workspace over /app so the editable install (done at
      # build time against /app) points at the live source.
      - .:/app:cached
      # Persist the `claude` CLI login (Max-subscription OAuth used by the Claude
      # Agent SDK backend) across image rebuilds, so it's a one-time `claude` auth.
      # The container runs as `appuser`, so the CLI writes to /home/appuser/.claude.
      - claude_auth:/home/appuser/.claude
    working_dir: /app
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    container_name: agentic_librarian_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-agentic_librarian}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-librarian} -d ${POSTGRES_DB:-agentic_librarian}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: agentic_librarian_mlflow
    restart: always
    ports:
      - "127.0.0.1:${MLFLOW_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./mlruns:/app/mlruns
    # Backend store is constructed from the POSTGRES_* vars (single source of
    # truth, same as the db service) — no duplicated credentials.
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-agentic_librarian}
      --default-artifact-root /app/mlruns
      --host 0.0.0.0

volumes:
  pgdata:
  claude_auth:
