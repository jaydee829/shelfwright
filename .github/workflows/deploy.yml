name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "frontend/**"
      - "pyproject.toml"
      - "Dockerfile.api"
      - ".github/workflows/deploy.yml"
      - ".dockerignore"
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'   # dispatch-from-branch must not deploy prod
    permissions:
      contents: read
      id-token: write   # WIF: exchange the GitHub OIDC token for GCP credentials
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: librarian
          POSTGRES_PASSWORD: librarian_secret_password
          POSTGRES_DB: agentic_librarian
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      IMAGE: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/librarian/librarian-api:${{ github.sha }}
    steps:
      - name: Verify required repo Variables are set
        env:
          GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          GCP_DEPLOYER_SA: ${{ vars.GCP_DEPLOYER_SA }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_CLOUDSQL_CONNECTION: ${{ vars.GCP_CLOUDSQL_CONNECTION }}
          # Stage 4 (async enrichment) — the operator sets these during the rollout
          # (infra/08-cloud-tasks.sh prints the queue/SA values). Required so a deploy
          # never opens the gate with empty ENRICH_* env (which silently breaks enrichment).
          GCP_CLOUD_TASKS_QUEUE: ${{ vars.GCP_CLOUD_TASKS_QUEUE }}
          GCP_RUN_BASE_URL: ${{ vars.GCP_RUN_BASE_URL }}
          GCP_ENRICH_INVOKER_SA: ${{ vars.GCP_ENRICH_INVOKER_SA }}
          GCP_IMPORT_TASKS_QUEUE: ${{ vars.GCP_IMPORT_TASKS_QUEUE }}
          GCP_SEARCH_ENGINE_ID: ${{ vars.GCP_SEARCH_ENGINE_ID }}
          # Firebase WEB config — baked into the SPA at build time (gitignored .env.local isn't
          # in CI). Client-embeddable (not secret); required or the prod SPA can't sign in.
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
        run: |
          : "${GCP_WIF_PROVIDER:?set repo Variable GCP_WIF_PROVIDER (infra/05-iam-wif.sh prints it)}"
          : "${GCP_DEPLOYER_SA:?set repo Variable GCP_DEPLOYER_SA}"
          : "${GCP_PROJECT_ID:?set repo Variable GCP_PROJECT_ID}"
          : "${GCP_CLOUDSQL_CONNECTION:?set repo Variable GCP_CLOUDSQL_CONNECTION}"
          : "${GCP_CLOUD_TASKS_QUEUE:?set repo Variable GCP_CLOUD_TASKS_QUEUE (infra/08-cloud-tasks.sh prints it)}"
          : "${GCP_RUN_BASE_URL:?set repo Variable GCP_RUN_BASE_URL (the Cloud Run service base URL)}"
          : "${GCP_ENRICH_INVOKER_SA:?set repo Variable GCP_ENRICH_INVOKER_SA (infra/08-cloud-tasks.sh prints it)}"
          : "${GCP_IMPORT_TASKS_QUEUE:?set repo Variable GCP_IMPORT_TASKS_QUEUE (infra/08-cloud-tasks.sh prints it)}"
          : "${GCP_SEARCH_ENGINE_ID:?set repo Variable GCP_SEARCH_ENGINE_ID (the Programmable Search Engine id)}"
          : "${VITE_FIREBASE_API_KEY:?set repo Variable VITE_FIREBASE_API_KEY (from frontend/.env.local)}"
          : "${VITE_FIREBASE_AUTH_DOMAIN:?set repo Variable VITE_FIREBASE_AUTH_DOMAIN (from frontend/.env.local)}"
          : "${VITE_FIREBASE_PROJECT_ID:?set repo Variable VITE_FIREBASE_PROJECT_ID (from frontend/.env.local)}"
          : "${VITE_FIREBASE_APP_ID:?set repo Variable VITE_FIREBASE_APP_ID (from frontend/.env.local)}"

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,claude]"

      - name: Run tests (fast suite; lint.yml covers pre-commit)
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: librarian
          POSTGRES_PASSWORD: librarian_secret_password
          POSTGRES_DB: agentic_librarian
          GOOGLE_SEARCH_API_KEY: dummy-key-for-construction
        run: |
          pytest -m "not api_dependent and not slow and not live"

      - name: Build production image
        run: |
          docker build -f Dockerfile.api -t "$IMAGE" \
            --build-arg VITE_FIREBASE_API_KEY="${{ vars.VITE_FIREBASE_API_KEY }}" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg VITE_FIREBASE_PROJECT_ID="${{ vars.VITE_FIREBASE_PROJECT_ID }}" \
            --build-arg VITE_FIREBASE_APP_ID="${{ vars.VITE_FIREBASE_APP_ID }}" \
            .

      - name: Smoke-test image in runner (broken images never reach the registry)
        run: |
          docker run --rm -d -p 8080:8080 -e DATABASE_URL=postgresql://x:x@nohost:5432/x -e GOOGLE_SEARCH_API_KEY=dummy-key-for-construction --name api-smoke "$IMAGE"
          ok=""
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health; then ok=1; break; fi
            sleep 1
          done
          if [ -z "$ok" ]; then echo "::error::/health never came up"; docker logs api-smoke; docker rm -f api-smoke; exit 1; fi
          if ! curl -fsS http://localhost:8080/ | grep -q 'id="root"'; then
            echo "::error::/ did not serve the SPA shell"; docker logs api-smoke; docker rm -f api-smoke; exit 1
          fi
          docker rm -f api-smoke

      - id: auth
        name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Push image
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          docker push "$IMAGE"

      - id: deploy
        name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          service: librarian-api
          region: us-central1
          image: ${{ env.IMAGE }}
          flags: >-
            --allow-unauthenticated
            --service-account=librarian-api-runtime@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --add-cloudsql-instances=${{ vars.GCP_CLOUDSQL_CONNECTION }}
            --set-secrets=DATABASE_URL=librarian-db-url:latest,GOOGLE_SEARCH_API_KEY=librarian-google-search-key:latest,GOOGLE_BOOKS_API_KEY=librarian-google-books-key:latest,HARDCOVER_API_KEY=librarian-hardcover-key:latest
            --set-env-vars=SIGNUP_MODE=invite,GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT_ID }},AGENT_BACKEND=adk,GEMINI_MODEL=gemini-3.1-flash-lite,CLOUD_TASKS_QUEUE=${{ vars.GCP_CLOUD_TASKS_QUEUE }},IMPORT_TASKS_QUEUE=${{ vars.GCP_IMPORT_TASKS_QUEUE }},ENRICH_TARGET_BASE_URL=${{ vars.GCP_RUN_BASE_URL }},ENRICH_INVOKER_SA=${{ vars.GCP_ENRICH_INVOKER_SA }},ENRICH_OIDC_AUDIENCE=${{ vars.GCP_RUN_BASE_URL }},SEARCH_ENGINE_ID=${{ vars.GCP_SEARCH_ENGINE_ID }}
            --max-instances=2
            --memory=512Mi

      - id: smoke-token
        name: Mint identity token for the service
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}
          token_format: id_token
          id_token_audience: ${{ steps.deploy.outputs.url }}
          id_token_include_email: true

      - name: Live smoke test (/health + auth enforcement)
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          TOKEN="${{ steps.smoke-token.outputs.id_token }}"
          curl -fsS -H "Authorization: Bearer ${TOKEN}" "${URL}/health"
          # /history is Firebase-gated (Lift 1): IAM passes via X-Serverless-Authorization,
          # no Firebase token supplied → the app MUST answer 401. DB connectivity is now
          # verified by the operator runbook (the deployer cannot mint Firebase tokens).
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "X-Serverless-Authorization: Bearer ${TOKEN}" "${URL}/history")
          if [ "${code}" != "401" ]; then
            echo "::error::expected 401 from unauthenticated /history, got ${code}"
            exit 1
          fi
          echo "Live smoke passed: /health green; auth layer enforcing (401 without Firebase token)."
