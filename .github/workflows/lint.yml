name: Python CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: librarian
          POSTGRES_PASSWORD: librarian_secret_password
          POSTGRES_DB: agentic_librarian
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Include the `claude` extra so the deterministic Claude-backend unit tests (which import
          # claude_agent_sdk) collect and run in CI. It is a pure-Python package; the `claude` CLI
          # binary is NOT needed for these mocked tests (only the api_dependent live e2e needs it).
          pip install ".[dev,claude]"
          pip install pre-commit

      - name: Run pre-commit on all files
        run: |
          SKIP=pytest pre-commit run --all-files --show-diff-on-failure

      - name: Run tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: librarian
          POSTGRES_PASSWORD: librarian_secret_password
          POSTGRES_DB: agentic_librarian
          # Managers construct a genai.Client on the search path; a dummy key is enough
          # (embeddings are patched in tests, so no network call is made).
          GOOGLE_SEARCH_API_KEY: dummy-key-for-construction
        run: |
          pytest -m "not api_dependent and not slow and not live"
